<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider-Team | Devices</title>
<link rel="icon" type="image/png" href="../logos/spider.png">
<!-- تحميل مسبق للصور الأساسية لزيادة السرعة -->
<link rel="preload" as="image" href="../devices/gta4l/gta4l.png" fetchpriority="high">
<link rel="preload" as="image" href="../devices/a36xq/a36xq.png" fetchpriority="high">
<style>
/* استيراد نفس التنسيقات من index.html لضمان التناسق */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Arabic", "PingFang SC", "Apple SD Gothic Neo", "Helvetica Neue", Helvetica, Arial, sans-serif;
  scroll-behavior: smooth;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --primary-red: #ef4444;
  --primary-blue: #38bdf8;
  --bg-dark: #020617;
  --card-bg: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.1);
}

body {
  background: var(--bg-dark);
  color: white;
  overflow-x: hidden;
  min-height: 100vh;
  line-height: 1.5;
}

body::before {
  content: "";
  position: fixed;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(239, 68, 68, 0.4), transparent 70%);
  top: -100px;
  left: -100px;
  filter: blur(120px);
  z-index: -1;
  animation: floatRed 15s ease-in-out infinite;
  pointer-events: none;
  will-change: transform;
}

body::after {
  content: "";
  position: fixed;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(56, 189, 248, 0.3), transparent 70%);
  bottom: -100px;
  right: -100px;
  filter: blur(120px);
  z-index: -1;
  animation: floatBlue 18s ease-in-out infinite;
  pointer-events: none;
  will-change: transform;
}

nav {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 1200px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 25px;
  background: rgba(15, 23, 42, 0.6);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 100px;
  z-index: 1000;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
nav h2 { color: #ef4444; cursor: pointer; font-size: 1.2rem; }

.nav-menu {
  display: flex;
  align-items: center;
  gap: 5px;
}
.nav-menu a {
  color: #cbd5e1;
  text-decoration: none;
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.3s ease;
}
.nav-menu a:hover { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

#lang-select { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 5px; padding: 5px; }
#lang-select option {
  background: #0f172a;
  color: white;
}
.section { padding: 120px 20px 60px; text-align: center; max-width: 1200px; margin: 0 auto; }
.section h2 { margin-bottom: 50px; font-size: 32px; position: relative; display: inline-block; }
.section h2::after {
  content: "";
  position: absolute;
  bottom: -10px;
  left: 20%;
  right: 20%;
  height: 3px;
  background: linear-gradient(90deg, var(--primary-red), var(--primary-blue));
  border-radius: 10px;
}

.cards { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; }
.card {
  width: 280px; padding: 20px; border-radius: 24px;
  background: var(--card-bg); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative; overflow: hidden;
}
.card:hover {
  transform: translateY(-10px);
  border-color: rgba(239, 68, 68, 0.4);
  box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
}
.device-img-container {
  height: 240px; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
  padding: 0; margin-bottom: 15px; background: rgba(255, 255, 255, 0.02);
  display: flex; justify-content: center; align-items: center; overflow: hidden;
}
.device-img-container img { 
  width: 100%; height: 100%; object-fit: contain; 
  transform: scale(1.15); 
  opacity: 0; /* مخفية في البداية */
  transition: opacity 0.4s ease-in-out; /* تأثير ظهور ناعم */
}
.img-loaded { opacity: 1 !important; } /* تظهر فور التحميل */
/* وضع الإنترنت الضعيف: تقليل جودة الرندر والأنيميشن */
.low-perf body::before { display: none; }
.low-perf .card:hover { transform: none; box-shadow: none; }
.low-perf .device-img-container img { transform: scale(1) !important; image-rendering: auto; }

.reveal {
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.spotlight {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(600px circle at var(--x) var(--y), rgba(255,255,255,0.06), transparent 40%);
  pointer-events: none;
  z-index: 1;
}

.img-gta4l { transform: scale(1.15) !important; backface-visibility: hidden; }
.img-a36xq { transform: scale(1.6) !important; backface-visibility: hidden; }
.code-badge {
  display: inline-block; margin-top: 15px; padding: 8px 15px;
  background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5);
  border-radius: 10px; font-size: 13px; color: #fca5a5;
}

@keyframes floatRed {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(100px, 50px) scale(1.1); }
}
@keyframes floatBlue {
  0%, 100% { transform: translate(0, 0) scale(1); }
  40% { transform: translate(-100px, -50px) scale(1.2); }
}

@media (max-width: 480px) { 
  nav {
    width: 95%;
    top: 10px;
    padding: 8px 15px;
    border-radius: 20px;
  } nav h2 { font-size: 1rem; }
  .nav-menu { gap: 2px; }
  .nav-menu a { padding: 6px 10px; font-size: 12px; }
  .card { width: 100%; max-width: 320px; }
  .device-img-container { height: 200px; }
  .section h2 { font-size: 26px; }
}
</style>
</head>
<body>

<nav>
  <h2 data-i18n="logo" onclick="location.href='../index.html'">Spider-Team 🕷️</h2>
  <div class="nav-menu">
    <a href="../index.html" data-i18n="nav-home">Home</a>
    <select id="lang-select">
      <option value="en">English</option>
      <option value="ar">العربية</option>
      <option value="zh">中文</option><option value="ko">한국어</option>
      <option value="fr">Français</option>
    </select>
  </div>
</nav>

<section class="section reveal">
  <h2 data-i18n="devices-title">Supported Devices</h2>
  <div class="cards">

    <div class="card">
      <div class="device-img-container" style="position: relative; z-index: 2;">
        <img src="../devices/gta4l/gta4l.png" alt="Samsung Tab A7" class="img-gta4l" decoding="async" fetchpriority="high" onload="this.classList.add('img-loaded')">
      </div>
      <h3 data-i18n="d1-name">Samsung Tab A7</h3>
      <div class="code-badge">gta4l | gta4lwifi</div>
    </div>

    <div class="card">
      <div class="device-img-container" style="position: relative; z-index: 2;">
        <img src="../devices/a36xq/a36xq.png" alt="Samsung A36 5G" class="img-a36xq" decoding="async" fetchpriority="high" loading="lazy" onload="this.classList.add('img-loaded')">
      </div>
      <h3 data-i18n="d2-name">Samsung A36 5G</h3>
      <div class="code-badge">a36xq</div>
    </div>

  </div>
</section>

<script>
const translations = {
  en: { "logo": "Spider-Team 🕷️", "nav-home": "Home", "devices-title": "Supported Devices", "d1-name": "Samsung Tab A7", "d2-name": "Samsung A36 5G" },
  ar: { "logo": "فريق سبايدر 🕷️", "nav-home": "الرئيسية", "devices-title": "الأجهزة المدعومة", "d1-name": "سامسونج تاب A7", "d2-name": "سامسونج A36 5G" },
  zh: { "logo": "蜘蛛团队 🕷️", "nav-home": "首页", "devices-title": "支持的设备", "d1-name": "三星 Tab A7", "d2-name": "三星 A36 5G" },
  ko: { "logo": "스파이더 팀 🕷️", "nav-home": "홈", "devices-title": "지원되는 기기", "d1-name": "삼성 탭 A7", "d2-name": "삼성 탭 A36 5G" },
  fr: { "logo": "Équipe Spider 🕷️", "nav-home": "Accueil", "devices-title": "Appareils Supportés", "d1-name": "Samsung Tab A7", "d2-name": "Samsung A36 5G" }
};

const langSelect = document.getElementById('lang-select');
langSelect.addEventListener('change', (e) => setLanguage(e.target.value));

function setLanguage(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (translations[lang][key]) el.innerText = translations[lang][key];
  });
  document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
  localStorage.setItem('selectedLang', lang);
}

// Sync language from main page
window.onload = () => {
  const savedLang = localStorage.getItem('selectedLang') || 'en';
  langSelect.value = savedLang;
  setLanguage(savedLang);

  // تحسين الأداء بناءً على سرعة الإنترنت (Adaptive Performance)
  if ('connection' in navigator) {
    const conn = navigator.connection;
    const isSlow = conn.saveData || (conn.effectiveType && (conn.effectiveType.includes('2g') || conn.effectiveType.includes('3g')));
    
    if (isSlow) {
      document.body.classList.add('low-perf');
    }
    
    // تحديث الحالة إذا تغيرت سرعة النت أثناء التصفح
    conn.onchange = () => location.reload();
  }

  // Reveal Animations on Scroll
  const observerOptions = { threshold: 0.1 };
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.opacity = "1";
        entry.target.style.transform = "translateY(0)";
        observer.unobserve(entry.target);
      }
    });
  }, observerOptions);
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // Spotlight Effect for Cards
  const spotlightCards = document.querySelectorAll('.card');
  spotlightCards.forEach(card => {
    card.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      card.style.setProperty('--x', `${x}px`);
      card.style.setProperty('--y', `${y}px`);
      if (!card.querySelector('.spotlight')) {
        const spotlight = document.createElement('div');
        spotlight.classList.add('spotlight');
        card.appendChild(spotlight);
      }
    });
  });
};
</script>
</body>
</html>
