<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider-Team</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  overflow-x: hidden;
}

/* 🔥 Glow Red + Blue */
body::before {
  content: "";
  position: fixed;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(239,68,68,0.4), transparent);
  top: -100px;
  left: -100px;
  filter: blur(120px);
}

body::after {
  content: "";
  position: fixed;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(56,189,248,0.3), transparent);
  bottom: -100px;
  right: -100px;
  filter: blur(120px);
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

nav h2 {
  color: #ef4444;
}

nav a {
  color: #cbd5e1;
  margin-left: 20px;
  text-decoration: none;
}

nav a:hover {
  color: #ef4444;
}

/* Language Selector */
#lang-select {
  background: rgba(255, 255, 255, 0.1);
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 5px;
  padding: 5px;
  cursor: pointer;
}

#lang-select option {
  background: #0f172a;
  color: white;
}

/* Hero */
.hero {
  height: 90vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
}

.hero h1 {
  font-size: 60px;
}

.hero span {
  background: linear-gradient(90deg, #ef4444, #38bdf8);
  -webkit-background-clip: text;
  color: transparent;
}

.hero p {
  margin-top: 10px;
  color: #94a3b8;
}

/* Button */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 12px;
  background: rgba(239,68,68,0.2);
  border: 1px solid rgba(239,68,68,0.5);
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: rgba(239,68,68,0.4);
  transform: scale(1.05);
}

/* Sections */
.section {
  padding: 60px 20px;
  text-align: center;
}

/* Cards */
.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  width: 260px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 0 30px rgba(239,68,68,0.4);
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  color: #64748b;
}

/* --- Responsive Media Queries --- */

/* Tablets (iPad, etc.) */
@media (max-width: 768px) {
  nav {
    padding: 15px 25px;
  }
  .hero h1 {
    font-size: 45px;
  }
  .cards {
    gap: 15px;
  }
}

/* Mobile Phones (Portrait) */
@media (max-width: 480px) {
  nav {
    flex-direction: column;
    align-items: center;
    padding: 15px;
    gap: 10px;
  }
  nav a {
    margin: 5px 10px;
  }
  .hero h1 {
    font-size: 35px;
  }
  .card {
    width: 100%;
    max-width: 320px;
  }
}

/* Mobile Landscape (الوضع الأفقي) */
@media (max-height: 500px) and (orientation: landscape) {
  .hero {
    height: auto;
    padding: 100px 20px;
  }
  .hero h1 {
    font-size: 40px;
  }
}
</style>
</head>

<body>

<nav>
  <h2 data-i18n="logo">Spider-Team 🕷️</h2>
  <div>
    <a href="#" data-i18n="nav-home">Home</a>
    <a href="#" data-i18n="nav-projects">Projects</a>
    <a href="#" data-i18n="nav-team">Team</a>
    <select id="lang-select">
      <option value="en">English</option>
      <option value="ar">العربية</option>
      <option value="zh">中文</option>
      <option value="ko">한국어</option>
      <option value="fr">Français</option>
    </select>
  </div>
</nav>

<section class="hero">
  <h1><span data-i18n="hero-we-are">We Are</span> <span data-i18n="hero-name">Spider-Team</span></h1>
  <p data-i18n="hero-motto">Power • Speed • Innovation 🕷️</p>
  <a href="#" class="btn" data-i18n="hero-btn">Enter</a>
</section>

<section class="section">
  <h2 data-i18n="projects-title">Our Projects</h2>
  <div class="cards">

    <div class="card">
      <h3 data-i18n="p1-title">Web App</h3>
      <p data-i18n="p1-desc">Fast & modern UI</p>
    </div>

    <div class="card">
      <h3 data-i18n="p2-title">Security Tool</h3>
      <p data-i18n="p2-desc">Advanced protection</p>
    </div>

    <div class="card">
      <h3 data-i18n="p3-title">Portfolio</h3>
      <p data-i18n="p3-desc">Creative design</p>
    </div>

  </div>
</section>

<section class="section">
  <h2 data-i18n="team-title">Our Team</h2>
  <div class="cards">

    <div class="card">
      <h3 data-i18n="m1-name">Member 1</h3>
      <p data-i18n="m1-role">Frontend</p>
    </div>

    <div class="card">
      <h3 data-i18n="m2-name">Member 2</h3>
      <p data-i18n="m2-role">Backend</p>
    </div>

    <div class="card">
      <h3 data-i18n="m3-name">Member 3</h3>
      <p data-i18n="m3-role">Designer</p>
    </div>

  </div>
</section>

<footer>
  <p data-i18n="footer">© 2026 Spider-Team 🕷️</p>
</footer>

<script>

    "hero-we-are": "We Are", "hero-name": "Spider-Team", "hero-motto": "Power • Speed • Innovation 🕷️", "hero-btn": "Enter",

    "projects-title": "مشاريعنا", "p1-title": "تطبيق ويب", "p1-desc": "واجهة سريعة وحديثة",
    "p2-title": "أداة أمان", "p2-desc": "حماية متقدمة", "p3-title": "معرض الأعمال", "p3-desc": "تصميم إبداعي",
    "team-title": "فريقنا", "m1-name": "عضو 1", "m1-role": "فرونت اند", "m2-name": "عضو 2", "m2-role": "باك اند",
    "m3-name": "عضو 3", "m3-role": "مصمم", "footer": "© 2026 فريق سبايدر 🕷️"

    "hero-we-are": "我们是", "hero-name": "蜘蛛团队", "hero-motto": "力量 • 速度 • 创新 🕷️", "hero-btn": "进入",

    "hero-we-are": "우리는", "hero-name": "스파이더 팀", "hero-motto": "힘 • 속도 • 혁신 🕷️", "hero-btn": "입장",
    "projects-title": "우리의 프로젝트", "p1-title": "웹 앱", "p1-desc": "빠르고 현대적인 UI",
    "p2-title": "보안 도구", "p2-desc": "고급 보호", "p3-title": "포트폴리오", "p3-desc": "창의적인 디자인",
    "team-title": "우리 팀", "m1-name": "멤버 1", "m1-role": "프론트엔드", "m2-name": "멤버 2", "m2-role": "백엔드",
    "m3-name": "멤버 3", "m3-role": "디자이너", "footer": "© 2026 스파이더 팀 🕷️"
  },
  fr: {
    "logo": "Équipe Spider 🕷️", "nav-home": "Accueil", "nav-projects": "Projets", "nav-team": "Équipe",
    "hero-we-are": "Nous sommes", "hero-name": "l'Équipe Spider", "hero-motto": "Puissance • Vitesse • Innovation 🕷️", "hero-btn": "Entrer",
    "projects-title": "Nos Projets", "p1-title": "Application Web", "p1-desc": "UI rapide et moderne",
    "p2-title": "Outil de Sécurité", "p2-desc": "Protection avancée", "p3-title": "Portfolio", "p3-desc": "Design créatif",
    "team-title": "Notre Équipe", "m1-name": "Membre 1", "m1-role": "Frontend", "m2-name": "Membre 2", "m2-role": "Backend",
    "m3-name": "Membre 3", "m3-role": "Designer", "footer": "© 2026 Équipe Spider 🕷️"
  }
};

const langSelect = document.getElementById('lang-select');

langSelect.addEventListener('change', (e) => {
  setLanguage(e.target.value);
});

function setLanguage(lang) {
  const elements = document.querySelectorAll('[data-i18n]');
  elements.forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (translations[lang][key]) {
      el.innerText = translations[lang][key];
    }
  });
  
  // Handle RTL for Arabic
  document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
}
</script>

</body>
</html>
